# Home Assistant configuration for the Sound BlasterX Katana.
#
# Add this to your configuration.yaml (or include it via !include).
# Replace KATANA_HOST with the IP/hostname of the Raspberry Pi running the API.

rest_command:
  katana_set_input:
    url: "http://KATANA_HOST:8099/input"
    method: POST
    content_type: "application/json"
    payload: '{"source": "{{ source }}"}'

  katana_set_profile:
    url: "http://KATANA_HOST:8099/profile"
    method: POST
    content_type: "application/json"
    payload: '{"profile": "{{ profile }}"}'

  katana_set_volume:
    url: "http://KATANA_HOST:8099/volume"
    method: POST
    content_type: "application/json"
    payload: '{"percent": {{ percent }}}'

  katana_mute:
    url: "http://KATANA_HOST:8099/mute"
    method: POST
    content_type: "application/json"
    payload: '{"muted": {{ muted }}}'

sensor:
  - platform: rest
    name: "Katana Firmware"
    resource: "http://KATANA_HOST:8099/info"
    value_template: "{{ value_json.firmware }}"
    json_attributes:
      - serial
      - hardware_id
    scan_interval: 3600

  - platform: rest
    name: "Katana Input"
    resource: "http://KATANA_HOST:8099/input"
    value_template: "{{ value_json.input }}"
    scan_interval: 30

  - platform: rest
    name: "Katana Volume"
    resource: "http://KATANA_HOST:8099/volume"
    value_template: "{{ value_json.percent }}"
    unit_of_measurement: "%"
    json_attributes:
      - muted
    scan_interval: 15

input_select:
  katana_input:
    name: "Katana Input"
    options:
      - computer
      - bluetooth
      - aux
      - optical
      - usb

  katana_profile:
    name: "Katana Profile"
    options:
      - neutral
      - profile-1
      - profile-2
      - profile-3
      - profile-4
      - personal

